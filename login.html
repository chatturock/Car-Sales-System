<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Car Sales System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="login-body">

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-lg-5">

<div class="login-card">

<div class="text-center">

<i class="bi bi-car-front-fill display-3 text-primary"></i>

<h2 class="mt-2">Car Sales System</h2>

<p class="text-muted">Welcome Back</p>

</div>

<form action="cars.html">

<div class="mb-3">

<label>Email</label>

<input type="email" class="form-control" placeholder="Enter Email" required>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input type="password" class="form-control" id="loginPassword" placeholder="Enter Password" required>

<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword')">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button class="btn btn-primary w-100">

Login

</button>

<p class="text-center mt-3">

Don't have an account?

<a href="register.html">Register</a>

</p>

</form>

</div>

</div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
