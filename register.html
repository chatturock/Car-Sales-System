<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Car Sales System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="login-body">

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-lg-6">

<div class="login-card">

<div class="text-center">

<i class="bi bi-car-front-fill display-3 text-primary"></i>

<h2 class="mt-2">Car Sales System</h2>

<p class="text-muted">Create Account</p>

</div>

<form>

<div class="mb-3">

<label>Full Name</label>

<input type="text" class="form-control" required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email" class="form-control" required>

</div>

<div class="mb-3">

<label>Phone Number</label>

<input type="tel" class="form-control" required>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input type="password" class="form-control" id="registerPassword" required>

<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('registerPassword')">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input type="password" class="form-control" required>

</div>

<button class="btn btn-success w-100">

Register

</button>

<p class="text-center mt-3">

Already have an account?

<a href="login.html">Login</a>

</p>

</form>

</div>

</div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
